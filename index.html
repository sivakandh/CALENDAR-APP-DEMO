<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== App Header ===== -->
  <header class="app-header">
    <div class="header-left">
      <h1 class="app-title">Calendar</h1>
    </div>
    <div class="header-nav">
      <button id="btn-prev" class="nav-btn" aria-label="Previous month">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button id="btn-today" class="nav-btn today-btn">Today</button>
      <button id="btn-next" class="nav-btn" aria-label="Next month">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <span id="month-year-label" class="month-year-label"></span>
    </div>
    <div class="header-right">
      <button id="btn-add-event" class="btn-primary" aria-label="Add event">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span class="btn-add-label">Add Event</span>
      </button>
    </div>
  </header>

  <!-- ===== Calendar ===== -->
  <main class="calendar-wrapper">
    <div class="day-names" aria-hidden="true">
      <span><span class="day-name-short">Sun</span><span class="day-name-letter">S</span></span>
      <span><span class="day-name-short">Mon</span><span class="day-name-letter">M</span></span>
      <span><span class="day-name-short">Tue</span><span class="day-name-letter">T</span></span>
      <span><span class="day-name-short">Wed</span><span class="day-name-letter">W</span></span>
      <span><span class="day-name-short">Thu</span><span class="day-name-letter">T</span></span>
      <span><span class="day-name-short">Fri</span><span class="day-name-letter">F</span></span>
      <span><span class="day-name-short">Sat</span><span class="day-name-letter">S</span></span>
    </div>
    <div id="calendar-grid" class="calendar-grid" role="grid" aria-label="Calendar"></div>
  </main>

  <!-- ===== Add / Edit Event Modal ===== -->
  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title" class="modal-title">Add Event</h2>
        <button id="btn-modal-close" class="modal-close-btn" aria-label="Close modal">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <form id="event-form" novalidate>
        <div class="form-group">
          <label for="field-title">Title <span class="required">*</span></label>
          <input type="text" id="field-title" placeholder="Event title" autocomplete="off">
        </div>

        <div class="form-group">
          <label for="field-date">Date <span class="required">*</span></label>
          <input type="date" id="field-date">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="field-start">Start Time</label>
            <input type="time" id="field-start">
          </div>
          <div class="form-group">
            <label for="field-end">End Time</label>
            <input type="time" id="field-end">
          </div>
        </div>

        <div class="form-group">
          <label for="field-notes">Notes</label>
          <textarea id="field-notes" rows="3" placeholder="Optional notes..."></textarea>
        </div>

        <p id="form-error" class="form-error hidden" role="alert"></p>

        <div class="form-actions">
          <button type="button" id="btn-delete-event" class="btn-danger hidden">Delete</button>
          <button type="submit" id="btn-save-event" class="btn-primary">Save Event</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
